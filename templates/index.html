<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio to MP3 PRO</title>
    <head>
    <meta charset="UTF-8">
    <title>Audio to MP3 Pro</title>

</head>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #E0E5EC; --text: #4A5568; --primary: #4D96FF;
            --shadow-light: #ffffff; --shadow-dark: #A3B1C6;
            --danger: #FF6B6B; --success: #27AE60;
        }

        body.dark-mode {
            --bg: #1E293B; --text: #E2E8F0; --primary: #3B82F6;
            --shadow-light: #334155; --shadow-dark: #0F172A;
        }

        body {
            background-color: var(--bg); font-family: 'Nunito', sans-serif;
            color: var(--text); display: flex; justify-content: center;
            align-items: center; height: 100vh; margin: 0; transition: 0.4s ease;
        }

        .app-window {
            background-color: var(--bg); border-radius: 40px; padding: 35px;
            width: 90%; max-width: 650px; position: relative;
            box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light),
                        inset 4px 4px 10px rgba(255, 255, 255, 0.1);
        }

        h1 { text-align: center; margin-top: 0; font-weight: 800; }

        .drop-zone {
            background: var(--bg); border-radius: 20px; padding: 20px; text-align: center;
            cursor: pointer; border: 2px dashed transparent;
            box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light);
            transition: 0.3s;
        }
        .drop-zone:hover { transform: scale(0.99); }
        .drop-zone.drag-active { border-color: var(--primary); }

        .file-list {
            margin-top: 20px; height: 200px; overflow-y: auto; padding: 10px;
            border-radius: 15px; box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        .file-item {
            display: flex; align-items: center; background: var(--bg); padding: 10px 15px;
            border-radius: 12px; margin-bottom: 10px;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            gap: 10px;
        }

        .play-btn {
            background: var(--primary); color: white; border: none; border-radius: 50%;
            width: 35px; height: 35px; cursor: pointer; font-size: 14px;
            box-shadow: 2px 2px 5px var(--shadow-dark), -2px -2px 5px var(--shadow-light);
        }
        .play-btn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2); }

        .file-info { flex-grow: 1; overflow: hidden; }
        .file-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; font-size: 14px;}
        
        .trim-controls { display: flex; gap: 5px; align-items: center; font-size: 12px; margin-top: 4px;}
        .trim-input {
            width: 50px; padding: 4px; border: none; border-radius: 5px; background: var(--bg);
            color: var(--text); text-align: center; font-family: inherit; font-size: 12px;
            box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
        }
        .trim-input:focus { outline: 1px solid var(--primary); }

        .btn-remove { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }

        .clay-btn {
            background: var(--primary); color: white; border: none; border-radius: 20px;
            padding: 16px 24px; font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: 0.2s; width: 100%; margin-top: 20px;
        }
        .clay-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); }
        .clay-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Progress Bar */
        .progress-container {
            margin-top: 20px; height: 12px; border-radius: 10px; background: var(--bg);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            overflow: hidden; display: none;
        }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }

        .status-bar { margin-top: 15px; text-align: center; font-weight: 700; color: var(--primary); }
        .clay-select { background: var(--bg); border: none; padding: 8px 12px; border-radius: 10px; color: var(--text); box-shadow: inset 3px 3px 6px var(--shadow-dark); outline: none; }
        
        .theme-toggle { position: absolute; top: 25px; right: 25px; padding: 8px; border-radius: 50%; font-size: 18px; box-shadow: 3px 3px 6px var(--shadow-dark); cursor:pointer; border:none; background:transparent;}

        #fileInput { display: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--shadow-dark); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-window">
        <button class="theme-toggle" onclick="toggleTheme()">🌗</button>
        <h1>🎵 Audio to MP3 PRO</h1>

        <input type="file" id="fileInput" multiple accept=".wav,.flac,.aac,.ogg,.m4a,.wma">

        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 24px;">📥</div> Click or Drag & Drop Files
        </div>

        <div class="file-list" id="file-list">
            <div style="text-align:center; padding-top:60px; opacity:0.5;">Queue is empty.</div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 15px; align-items: center;">
            <label style="font-weight: 800;">Bitrate:</label>
            <select id="bitrate" class="clay-select" onchange="savePrefs()">
                <option value="128k">128 kbps</option>
                <option value="192k">192 kbps</option>
                <option value="320k">320 kbps (Pro)</option>
            </select>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <button id="convert-btn" class="clay-btn" onclick="startConversion()">🚀 Convert Files</button>
        <div class="status-bar" id="status-bar">Ready</div>
    </div>

    <script>
        // --- 1. Preferences & Setup ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let queuedFiles = [];
        let activePlayer = null;
        let activeBtn = null;

        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
            if (localStorage.getItem('bitrate')) document.getElementById('bitrate').value = localStorage.getItem('bitrate');
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        function savePrefs() { localStorage.setItem('bitrate', document.getElementById('bitrate').value); }

        // --- 2. Synthetic Success Sound (No files needed!) ---
        function playSuccessChime() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        // --- 3. UI Interactions ---
        const dropZone = document.getElementById('drop-zone');
        ['dragover', 'drop'].forEach(e => dropZone.addEventListener(e, ev => ev.preventDefault()));
        dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-active'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-active'));
        dropZone.addEventListener('drop', ev => { dropZone.classList.remove('drag-active'); handleFiles(ev.dataTransfer.files); });
        document.getElementById('fileInput').addEventListener('change', function() { handleFiles(this.files); });

        function handleFiles(files) {
            queuedFiles = [...queuedFiles, ...Array.from(files).filter(f => f.type.includes('audio') || f.name.match(/\.(wav|flac|aac|ogg|m4a|wma)$/i))];
            renderQueue();
        }

        // Audio Preview Logic
        function togglePlay(index, btn) {
            if(activePlayer) { activePlayer.pause(); if(activeBtn) activeBtn.innerText = '▶'; }
            if(activePlayer && activePlayer.index === index) { activePlayer = null; return; } // Toggled off
            
            activePlayer = new Audio(URL.createObjectURL(queuedFiles[index]));
            activePlayer.index = index; activeBtn = btn;
            activePlayer.play();
            btn.innerText = '⏸';
            activePlayer.onended = () => { btn.innerText = '▶'; activePlayer = null; };
        }

        function renderQueue() {
            const list = document.getElementById('file-list');
            if (queuedFiles.length === 0) { list.innerHTML = '<div style="text-align:center; padding-top:60px; opacity:0.5;">Queue is empty.</div>'; return; }
            
            list.innerHTML = queuedFiles.map((f, i) => `
                <div class="file-item">
                    <button class="play-btn" onclick="togglePlay(${i}, this)">▶</button>
                    <div class="file-info">
                        <div class="file-name">${f.name}</div>
                        <div class="trim-controls">
                            Trim: <input type="text" id="start_${i}" class="trim-input" placeholder="00:00" title="Start Time"> 
                            to <input type="text" id="end_${i}" class="trim-input" placeholder="End" title="End Time">
                        </div>
                    </div>
                    <button class="btn-remove" onclick="queuedFiles.splice(${i},1); renderQueue();">✖</button>
                </div>
            `).join('');
        }

        // --- 4. Conversion & Polling Backend ---
        async function startConversion() {
            if (queuedFiles.length === 0) return alert("Queue is empty!");
            if (activePlayer) activePlayer.pause(); // Stop preview

            const btn = document.getElementById('convert-btn');
            const status = document.getElementById('status-bar');
            const progContainer = document.getElementById('progress-container');
            const progBar = document.getElementById('progress-bar');

            btn.disabled = true; progContainer.style.display = 'block'; progBar.style.width = '0%';
            status.innerText = "Uploading data...";

            const formData = new FormData();
            formData.append('bitrate', document.getElementById('bitrate').value);
            queuedFiles.forEach((file, i) => {
                formData.append('files', file);
                formData.append('start_times', document.getElementById(`start_${i}`).value);
                formData.append('end_times', document.getElementById(`end_${i}`).value);
            });

            try {
                // 1. Start Task
                let res = await fetch('/convert', { method: 'POST', body: formData });
                let data = await res.json();
                let taskId = data.task_id;

                // 2. Poll for Progress
                let interval = setInterval(async () => {
                    let pollRes = await fetch(`/status/${taskId}`);
                    let pollData = await pollRes.json();

                    status.innerText = pollData.status;
                    progBar.style.width = pollData.progress + '%';

                    if (pollData.ready || pollData.error) {
                        clearInterval(interval);
                        btn.disabled = false;
                        
                        if (pollData.ready) {
                            playSuccessChime();
                            window.location.href = `/download/${taskId}`; // Trigger download
                            queuedFiles = []; renderQueue(); // Clear queue
                            setTimeout(() => progContainer.style.display = 'none', 3000);
                        }
                    }
                }, 1000); // Check every second

            } catch (err) {
                status.innerText = "❌ Network Error"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
